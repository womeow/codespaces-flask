<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Список Дел</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Список задач</h1>
        
        <!-- Форма ввода -->
        <div class="input-group">
            <input type="text" id="taskTitle" placeholder="Что нужно сделать?">
            <select id="taskPriority">
                <option value="1">Высокий</option>
                <option value="2" selected>Средний</option>
                <option value="3">Низкий</option>
            </select>
            <input type="date" id="taskDeadline">
            <button onclick="addTask()">Добавить</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        // Функция для загрузки и отрисовки задач
        async function renderTasks() {
            const response = await fetch('/tasks');
            const tasks = await response.json();
            const list = document.getElementById('taskList');
            
            // Получаем сегодняшнюю дату для сравнения
            const now = new Date().toISOString().split('T')[0];

            list.innerHTML = tasks.map(task => {
                // Если дата прошла и задача не готова — она просрочена
                const isOverdue = task.deadline && task.deadline < now && !task.completed;
                
                return `
                    <li class="task-item priority-${task.priority} ${isOverdue ? 'overdue' : ''}">
                        <div class="task-info">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTask(${task.id})">
                            <span class="${task.completed ? 'completed' : ''}">${task.title}</span>
                            <small>Срок: ${task.deadline || 'не указан'}</small>
                        </div>
                        <button class="btn-delete" onclick="deleteTask(${task.id})">🗑️</button>
                    </li>
                `;
            }).join('');
        }

        // Функция отправки новой задачи на сервер
        async function addTask() {
            const title = document.getElementById('taskTitle').value;
            const priority = document.getElementById('taskPriority').value;
            const deadline = document.getElementById('taskDeadline').value;

            if (!title) return alert("Введите название!");

            await fetch('/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, priority, deadline })
            });

            document.getElementById('taskTitle').value = ''; // Очищаем поле
            renderTasks(); // Обновляем список
        }

        async function toggleTask(id) {
            await fetch(`/tasks/${id}`, { method: 'PUT' });
            renderTasks();
        }

        async function deleteTask(id) {
            await fetch(`/tasks/${id}`, { method: 'DELETE' });
            renderTasks();
        }

        // Запускаем отрисовку при открытии страницы
        renderTasks();
    </script>
</body>
</html>
